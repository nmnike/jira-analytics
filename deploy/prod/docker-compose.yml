name: jira-analytics-prod

# Variables resolved from .env in this directory (same folder as this file).
# Run: docker compose --env-file .env up -d
# Never commit .env — only .env.example is in the repo.

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jira_analytics_prod
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: Europe/Moscow
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d jira_analytics_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: jira_analytics_prod
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      BACKUP_DIR: /backups
      TZ: Europe/Moscow
    volumes:
      - ./backups:/backups
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${GHCR_ORG}/jira-analytics:${APP_VERSION}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Overrides any DATABASE_URL that might be in .env
      DATABASE_URL: "postgresql://app:${DB_PASSWORD}@postgres:5432/jira_analytics_prod"
      HF_HOME: /opt/hf-cache
    volumes:
      - app-data-prod:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 6G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      # Place TLS certificate files here (provided by sysadmin / corporate CA):
      #   ./proxy/certs/fullchain.pem  — certificate + intermediate chain
      #   ./proxy/certs/privkey.pem    — private key (chmod 600)
      - ./proxy/certs:/etc/nginx/certs:ro
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata-prod:
    name: pgdata-prod
  app-data-prod:
    name: app-data-prod

networks:
  internal:
    driver: bridge
    # postgres and backend are NOT reachable from the host directly.
    # Only proxy has host ports (80, 443).
