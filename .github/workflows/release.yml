name: Release

# Triggered when a SemVer tag is pushed (e.g. v1.2.3).
# Source-only release: generates a changelog from Conventional Commits and
# creates a GitHub Release with the auto-attached source archives.
# The server team builds their own Docker image from these sources.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist on origin)'
        required: true
        type: string

permissions:
  contents: write     # for creating the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0    # full history for changelog generation

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: CHANGES.md
          draft: false
          prerelease: false
          # GitHub auto-attaches Source code (zip) and Source code (tar.gz)
