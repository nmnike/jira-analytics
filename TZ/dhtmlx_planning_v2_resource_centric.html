<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Планирование ресурсов · Ресурсо-центричный</title>

<!-- DHTMLX Gantt Standard (GPL-2.0) -->
<link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
<script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
<script src="https://cdn.dhtmlx.com/gantt/edge/locale/locale_ru.js"></script>

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base:       #141414;
  --bg-panel:      #1f1f1f;
  --bg-elevated:   #262626;
  --bg-hover:      #2a2a2a;
  --border:        #303030;
  --border-subtle: #1f1f1f;
  --text-primary:  #e6e6e6;
  --text-secondary:#8c8c8c;
  --text-muted:    #595959;
  --accent:        #1677ff;
  --accent-hover:  #4096ff;
  --accent-dim:    rgba(22,119,255,0.12);

  /* Role colours */
  --analyst:  #69b1ff;
  --dev:      #b37feb;
  --qa:       #95de64;
  --ope:      #ffa940;

  /* Initiative palette */
  --init-1: #1677ff;
  --init-2: #722ed1;
  --init-3: #13c2c2;
  --init-4: #eb2f96;
  --init-5: #fa8c16;
  --init-6: #52c41a;
  --init-7: #fadb14;
  --init-8: #f5222d;
  --init-9: #2f54eb;
  --init-10:#08979c;

  /* Danger */
  --danger:  #ff4d4f;
  --warning: #fa8c16;
  --ok:      #52c41a;

  --row-h: 40px;
  --header-h: 64px;
  --sidebar-w: 320px;
  --left-col-w: 220px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 13px;
  background: var(--bg-base);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
}

/* ===== APP SHELL ===== */
.app-header {
  height: var(--header-h);
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  flex-shrink: 0;
  z-index: 100;
}

.app-header__logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-header__icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.app-header__title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
}

.app-header__subtitle {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 1px;
}

.header-divider {
  width: 1px;
  height: 32px;
  background: var(--border);
  flex-shrink: 0;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.btn--primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn--primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }

.btn--active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.quarter-selector {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px;
}

.quarter-btn {
  padding: 4px 10px;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.quarter-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.quarter-btn.active { background: var(--accent); color: #fff; }

.select-control {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 12px;
  padding: 6px 10px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
.select-control:hover, .select-control:focus { border-color: var(--accent); }
.select-control option { background: var(--bg-elevated); }

.scale-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px;
}
.scale-btn {
  padding: 4px 10px;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.scale-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.scale-btn.active { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }

.header-spacer { flex: 1; }

.conflict-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,77,79,0.12);
  border: 1px solid rgba(255,77,79,0.4);
  color: var(--danger);
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.conflict-badge:hover { background: rgba(255,77,79,0.2); }
.conflict-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* ===== MAIN LAYOUT ===== */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== GANTT CONTAINER ===== */
.gantt-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

#gantt_here {
  flex: 1;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.2s;
}

.sidebar.collapsed { width: 0; border-left-width: 0; }

.sidebar-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.sidebar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.sidebar-close {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 16px;
}
.sidebar-close:hover { background: var(--bg-hover); color: var(--text-primary); }

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.sidebar-body::-webkit-scrollbar { width: 4px; }
.sidebar-body::-webkit-scrollbar-track { background: transparent; }
.sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-muted);
  text-align: center;
  gap: 8px;
}
.sidebar-empty-icon { font-size: 32px; opacity: 0.4; }

.detail-init-color {
  width: 100%; height: 4px;
  border-radius: 4px;
  margin-bottom: 14px;
}

.detail-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 4px;
}

.detail-key {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'Consolas', monospace;
  margin-bottom: 16px;
}

.detail-section { margin-bottom: 20px; }

.detail-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.detail-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.detail-row:last-child { border-bottom: none; }

.detail-label { font-size: 12px; color: var(--text-secondary); }
.detail-value { font-size: 12px; color: var(--text-primary); font-weight: 500; }

.phase-list { display: flex; flex-direction: column; gap: 6px; }

.phase-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
}

.phase-icon {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.phase-info { flex: 1; min-width: 0; }
.phase-name { font-size: 12px; color: var(--text-primary); font-weight: 500; }
.phase-dates { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

.phase-status {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
}
.phase-status.done { background: rgba(82,196,26,0.15); color: var(--ok); }
.phase-status.active { background: rgba(22,119,255,0.15); color: var(--accent); }
.phase-status.pending { background: var(--bg-hover); color: var(--text-muted); }
.phase-status.conflict { background: rgba(255,77,79,0.15); color: var(--danger); }

.progress-bar-wrap {
  height: 4px;
  background: var(--bg-elevated);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 10px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  transition: width 0.3s;
}

.assignee-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.assignee-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 4px 4px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 12px;
  color: var(--text-primary);
}

.chip-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-primary);
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  animation: slideIn 0.25s ease, fadeOut 0.3s ease 2.7s forwards;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 240px;
  max-width: 360px;
  pointer-events: auto;
}

.toast-icon { font-size: 16px; }

@keyframes slideIn {
  from { transform: translateY(12px); opacity: 0; }
  to   { transform: translateY(0);   opacity: 1; }
}
@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(6px); }
}

/* ===== LEGEND ===== */
.legend-bar {
  height: 36px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 16px;
  flex-shrink: 0;
  overflow-x: auto;
}
.legend-bar::-webkit-scrollbar { display: none; }

.legend-group {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.legend-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
}

.legend-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

.legend-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

/* ===== DHTMLX GANTT OVERRIDES (Dark Theme) ===== */
.gantt_container, .gantt_task, .gantt_grid {
  background: var(--bg-base);
  color: var(--text-primary);
  border-color: var(--border);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 12px;
}

/* Grid area */
.gantt_grid_scale, .gantt_task_scale {
  background: var(--bg-panel) !important;
  border-bottom: 2px solid var(--border) !important;
}

.gantt_scale_cell, .gantt_grid_column_resize_wrap {
  color: var(--text-secondary) !important;
  border-right-color: var(--border) !important;
  font-size: 11px !important;
  font-weight: 500 !important;
}

/* Row alternation */
.gantt_row, .gantt_row.gantt_row_task {
  background: var(--bg-base) !important;
  border-bottom: 1px solid var(--border-subtle) !important;
}

.gantt_row:nth-child(even), .gantt_row.gantt_row_task:nth-child(even) {
  background: rgba(255,255,255,0.015) !important;
}

.gantt_row:hover, .gantt_row.gantt_row_task:hover {
  background: var(--bg-hover) !important;
}

/* Group row (role header) */
.gantt_row.group-row, .gantt_row.gantt_row_task.group-row {
  background: var(--bg-panel) !important;
  border-top: 1px solid var(--border) !important;
}

.gantt_row.group-row:hover, .gantt_row.gantt_row_task.group-row:hover {
  background: var(--bg-elevated) !important;
}

/* Grid columns */
.gantt_grid_data .gantt_cell {
  border-right: 1px solid var(--border-subtle) !important;
  color: var(--text-primary) !important;
}

/* Task chart background */
.gantt_task_bg {
  background: var(--bg-base) !important;
}

/* Weekends / today */
.gantt_task_row.gantt_selected { background: var(--accent-dim) !important; }

/* Timeline cells */
.gantt_task_cell {
  border-right: 1px solid var(--border-subtle) !important;
}

.gantt_task_cell.week_end {
  background: rgba(255,255,255,0.025) !important;
}

/* Today line */
.gantt_today_line { background: var(--accent) !important; opacity: 0.6; width: 2px !important; }

/* Task bar */
.gantt_task_line {
  border-radius: 4px !important;
  border: none !important;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4) !important;
}

.gantt_task_content {
  font-size: 11px !important;
  font-weight: 600 !important;
  color: rgba(255,255,255,0.9) !important;
  padding: 0 8px !important;
  letter-spacing: 0.03em;
}

/* Conflict task */
.gantt_task_line.conflict-bar {
  box-shadow: 0 0 0 2px var(--danger), 0 2px 8px rgba(255,77,79,0.4) !important;
}

/* Row conflict highlight */
.gantt_task_row.overloaded {
  background: rgba(255,77,79,0.06) !important;
}

/* Drag handle */
.gantt_task_drag { background: rgba(255,255,255,0.15) !important; }

/* Links */
.gantt_task_link .gantt_line_wrapper div { background: var(--border) !important; }
.gantt_link_arrow { border-color: var(--border) !important; }

/* Tooltip */
.gantt_tooltip {
  background: var(--bg-elevated) !important;
  border: 1px solid var(--border) !important;
  color: var(--text-primary) !important;
  font-size: 12px !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6) !important;
  border-radius: 8px !important;
  padding: 10px 14px !important;
}

/* Scroll */
.gantt_hor_scroll, .gantt_ver_scroll { background: var(--bg-panel) !important; }

/* Grid header */
.gantt_grid_scale .gantt_grid_column_resize_wrap { background: var(--bg-panel) !important; }

/* Resize handle */
.gantt_drag_marker { background: var(--accent-dim) !important; border: 1px dashed var(--accent) !important; border-radius: 4px !important; }

/* Avatar cell custom */
.employee-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 100%;
  padding: 4px 0;
}

.emp-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.emp-info { min-width: 0; }
.emp-name { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-role { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

.group-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 100%;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.group-arrow { font-size: 10px; transition: transform 0.15s; }
.group-arrow.expanded { transform: rotate(90deg); }

.role-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Conflict tooltip override */
.conflict-tooltip { padding: 8px 12px; }
.conflict-tooltip strong { color: var(--danger); display: block; margin-bottom: 4px; }
.conflict-tooltip span { color: var(--text-secondary); }

</style>
</head>
<body>

<!-- ===== APP HEADER ===== -->
<header class="app-header">
  <div class="app-header__logo">
    <div class="app-header__icon">📅</div>
    <div>
      <div class="app-header__title">Планирование ресурсов · Ресурсо-центричный</div>
      <div class="app-header__subtitle">Квартальный план · Q3 2026</div>
    </div>
  </div>

  <div class="header-divider"></div>

  <div class="header-controls">
    <!-- Quarter selector -->
    <div class="quarter-selector">
      <button class="quarter-btn" onclick="setQuarter('Q2')">Q2</button>
      <button class="quarter-btn active" onclick="setQuarter('Q3')">Q3</button>
      <button class="quarter-btn" onclick="setQuarter('Q4')">Q4</button>
    </div>

    <!-- Scale toggle -->
    <div class="scale-toggle">
      <button class="scale-btn active" id="scaleWeek" onclick="setScale('week')">Нед</button>
      <button class="scale-btn" id="scaleDay" onclick="setScale('day')">День</button>
      <button class="scale-btn" id="scaleMonth" onclick="setScale('month')">Мес</button>
    </div>

    <!-- Filters -->
    <select class="select-control" id="roleFilter" onchange="applyFilter()">
      <option value="">Все роли</option>
      <option value="analyst">Аналитики</option>
      <option value="dev">Разработчики</option>
      <option value="qa">Тестировщики</option>
      <option value="ope">ОПЭ</option>
    </select>

    <select class="select-control" id="initFilter" onchange="applyFilter()">
      <option value="">Все инициативы</option>
    </select>

    <button class="btn" onclick="gantt.collapseAll()">⊟ Свернуть</button>
    <button class="btn" onclick="gantt.expandAll()">⊞ Развернуть</button>
  </div>

  <div class="header-spacer"></div>

  <div class="conflict-badge" id="conflictBadge" onclick="showConflictPanel()">
    <div class="conflict-dot"></div>
    <span id="conflictCount">5 конфликтов</span>
  </div>

  <button class="btn btn--primary" onclick="showToast('🚀', 'Solver запущен — оптимизация...', 'info')">⚡ Solver</button>
  <button class="btn" onclick="toggleSidebar()">☰ Детали</button>
</header>

<!-- ===== MAIN BODY ===== -->
<div class="app-body">

  <!-- Gantt -->
  <div class="gantt-wrapper">
    <div id="gantt_here"></div>

    <!-- Legend bar -->
    <div class="legend-bar">
      <span class="legend-label">Фазы:</span>
      <div class="legend-group">
        <div class="legend-item"><div class="legend-dot" style="background:#8ab4f8;"></div> А — Анализ</div>
        <div class="legend-item"><div class="legend-dot" style="background:#b69cfa;"></div> Р — Разработка</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7ec98a;"></div> Т — Тестирование</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffb86c;"></div> О — ОПЭ</div>
      </div>
      <div class="legend-sep"></div>
      <span class="legend-label">Роли:</span>
      <div class="legend-group">
        <div class="legend-item"><div class="legend-dot" style="background:var(--analyst);"></div> Аналитик</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--dev);"></div> Разработчик</div>

// =========================================

function buildGanttData() {
  const tasks = [];
  const links = [];
  let order = 1;

  // Group rows
  ROLES.forEach(role => {
    tasks.push({
      id: 'g_' + role.id,
      text: role.name,
      type: 'project',
      open: true,
      render: 'split',
      color: 'transparent',
      _isGroup: true,
      _role: role.id,
      _roleColor: role.color,
      order: order++,
    });

    // Employee rows
    EMPLOYEES.filter(e => e.role === role.id).forEach(emp => {
      tasks.push({
        id: emp.id,
        text: emp.name,
        type: 'project',
        parent: 'g_' + role.id,
        open: true,
        render: 'split',
        color: 'transparent',
        _isEmployee: true,
        _emp: emp,
        _role: role.id,
        _roleColor: role.color,
        order: order++,
      });

      // Task bars for this employee
      TASKS_RAW.filter(t => t.emp === emp.id).forEach(t => {
        const init = initMap[t.init];
        const phaseMeta = PHASE_META[t.phase];
        const barColor = phaseMeta ? phaseMeta.barColor : init.color;

        tasks.push({
          id: t.id,
          text: t.phase + ' · ' + init.name,
          start_date: t.start,
          end_date: t.end,
          parent: emp.id,
          color: barColor,
          _conflict: t.conflict,
          _init: init,
          _phase: t.phase,
          _emp: emp,
          order: order++,
          progress: init.progress,
          readonly: false,
        });
      });
    });
  });

  return { data: tasks, links };
}

// Task templates

gantt.templates.tooltip_text = function(start, end, task) {

  const dateStr = gantt.date.date_to_str('%d.%m.%Y');

// =========================================
// SCALE SWITCHER
// =========================================

function setScale(mode) {
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  if (mode === 'week') {
    document.getElementById('scaleWeek').classList.add('active');
    gantt.config.scales = [
      { unit: 'month', step: 1, format: '%F %Y' },
      { unit: 'week',  step: 1, format: 'Нед %W' },
    ];
    gantt.config.min_column_width = 100;
  } else if (mode === 'day') {
    document.getElementById('scaleDay').classList.add('active');
    gantt.config.scales = [
      { unit: 'week', step: 1, format: 'Нед %W · %d %M' },
      { unit: 'day',  step: 1, format: '%d' },
    ];
    gantt.config.min_column_width = 30;
  } else {
    document.getElementById('scaleMonth').classList.add('active');
    gantt.config.scales = [
      { unit: 'quarter', step: 1, format: 'Q%q %Y' },
      { unit: 'month',   step: 1, format: '%F' },
    ];
    gantt.config.min_column_width = 120;
  }
  gantt.render();
}

// =========================================
// QUARTER SWITCHER
// =========================================

function setQuarter(q) {
  document.querySelectorAll('.quarter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (q === 'Q2') {
    gantt.config.start_date = new Date(2026, 3, 1);
    gantt.config.end_date   = new Date(2026, 6, 1);
  } else if (q === 'Q3') {
    gantt.config.start_date = new Date(2026, 6, 1);
    gantt.config.end_date   = new Date(2026, 9, 1);
  } else {
    gantt.config.start_date = new Date(2026, 9, 1);
    gantt.config.end_date   = new Date(2026, 12, 1);
  }
  gantt.render();
}

// =========================================
// FILTER
// =========================================

function applyFilter() {
  const role = document.getElementById('roleFilter').value;
  const initId = document.getElementById('initFilter').value;

  gantt.filter_task = function(id, task) {
    if (task._isGroup) {
      if (role && task._role !== role) return false;
      return true;
    }
    if (task._isEmployee) {
      if (role && task._role !== role) return false;
      return true;
    }
    // Task bar
    if (role && task._emp && task._emp.role !== role) return false;
    if (initId && task._init && task._init.id !== initId) return false;
    return true;
  };

  gantt.render();
}

let sidebarOpen = false;

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

function showTaskDetail(task) {
  if (!sidebarOpen) {
    sidebarOpen = true;
    document.getElementById('sidebar').classList.remove('collapsed');
  }

  const init = task._init || {};
  const phase = task._phase;
  const emp = task._emp || {};
  const role = roleMap[emp.role] || {};
  const phaseMeta = PHASE_META[phase] || {};
  const dateStr = gantt.date.date_to_str('%d.%m.%Y');

  document.getElementById('sidebarTitle').textContent = init.name || task.text;

  // Build all phases for this initiative
  const initTasks = TASKS_RAW.filter(t => t.init === (init.id || ''));
  const phases = ['А', 'Р', 'Т', 'О'];
  const phaseLabels = { 'А': 'Анализ', 'Р': 'Разработка', 'Т': 'Тестирование', 'О': 'ОПЭ' };
  const phaseColors = { 'А': '#1677ff', 'Р': '#722ed1', 'Т': '#52c41a', 'О': '#fa8c16' };
  const phaseRoles = { 'А': 'analyst', 'Р': 'dev', 'Т': 'qa', 'О': 'ope' };

  const phaseItems = phases.map(ph => {
    const phaseTasks = initTasks.filter(t => t.phase === ph);
    if (phaseTasks.length === 0) return '';

    const firstStart = phaseTasks.reduce((a, t) => t.start < a ? t.start : a, phaseTasks[0].start);
    const lastEnd   = phaseTasks.reduce((a, t) => t.end > a ? t.end : a, phaseTasks[0].end);
    const hasConflict = phaseTasks.some(t => t.conflict);

    // Status: simple time-based
    const now = new Date(2026, 6, 15); // mid-Q3
    const startD = new Date(firstStart);
    const endD   = new Date(lastEnd);
    let status = 'pending', statusLabel = 'Ожидание';
    if (endD < now) { status = 'done'; statusLabel = 'Готово'; }
    else if (startD <= now) { status = 'active'; statusLabel = 'В работе'; }
    if (hasConflict) { status = 'conflict'; statusLabel = 'Конфликт'; }

    const roleColor = roleMap[phaseRoles[ph]]?.color || '#888';

    return `
      <div class="phase-item">
        <div class="phase-icon" style="background:${phaseColors[ph]}22;color:${phaseColors[ph]};border:1px solid ${phaseColors[ph]}44;">${ph}</div>
        <div class="phase-info">
          <div class="phase-name">${phaseLabels[ph]}</div>
          <div class="phase-dates">${firstStart.slice(5)} — ${lastEnd.slice(5)}</div>
        </div>
        <div class="phase-status ${status}">${statusLabel}</div>
      </div>
    `;
  }).join('');

  // Assignees for this initiative
  const assigneeIds = [...new Set(initTasks.map(t => t.emp))];
  const chipHtml = assigneeIds.map(eid => {
    const emp = empMap[eid];
    if (!emp) return '';
    const role = roleMap[emp.role];
    const initials = emp.name.split(' ').map(p => p[0]).join('').slice(0,2);
    return `<div class="assignee-chip">
      <div class="chip-avatar" style="background:${role?.color || '#888'}cc">${initials}</div>
      <span>${emp.name}</span>
    </div>`;
  }).join('');

  const progressPct = Math.round((init.progress || 0) * 100);

  document.getElementById('sidebarBody').innerHTML = `
    <div class="detail-init-color" style="background:${init.color || '#1677ff'};"></div>
    <div class="detail-name">${init.name || task.text}</div>
    <div class="detail-key">${init.key || ''}</div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${progressPct}%;background:${init.color || 'var(--accent)'};"></div>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin:6px 0 16px;text-align:right;">${progressPct}% завершено</div>

    <div class="detail-section">
      <div class="detail-section-title">Параметры</div>
      <div class="detail-row">
        <span class="detail-label">Статус</span>
        <span class="detail-value" style="color:var(--ok);">В работе</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Квартал</span>
        <span class="detail-value">Q3 2026</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Фаза выбрана</span>
        <span class="detail-value">${phaseLabels[phase] || phase}</span>
      </div>
      ${task._conflict ? `<div class="detail-row">
        <span class="detail-label" style="color:var(--danger);">⚠ Перегруз</span>
        <span class="detail-value" style="color:var(--danger);">11ч / 8ч</span>
      </div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Фазы инициативы</div>
      <div class="phase-list">${phaseItems}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Назначены (${assigneeIds.length})</div>
      <div class="assignee-chips">${chipHtml}</div>
    </div>
  `;
}

// =========================================
// CONFLICT PANEL
// =========================================

function showConflictPanel() {
  const conflicts = TASKS_RAW.filter(t => t.conflict);
  let html = `
    <div style="font-size:13px;font-weight:600;color:var(--danger);margin-bottom:14px;">⚠ Конфликты перегрузки (${conflicts.length})</div>
  `;
  conflicts.forEach(t => {
    const init = initMap[t.init];
    const emp = empMap[t.emp];
    const role = roleMap[emp?.role];
    html += `
      <div style="padding:10px 12px;background:rgba(255,77,79,0.08);border:1px solid rgba(255,77,79,0.25);border-radius:6px;margin-bottom:8px;">
        <div style="font-weight:600;color:var(--text-primary);margin-bottom:4px;">${init?.name || t.init} · ${t.phase}</div>
        <div style="font-size:11px;color:var(--text-secondary);">${emp?.name || t.emp} · ${t.start} – ${t.end}</div>
        <div style="font-size:11px;color:var(--danger);margin-top:4px;">Перегруз: 11ч из 8ч доступных</div>
      </div>
    `;
  });

  document.getElementById('sidebarTitle').textContent = 'Конфликты';
  document.getElementById('sidebarBody').innerHTML = html;
  sidebarOpen = true;
  document.getElementById('sidebar').classList.remove('collapsed');
}

// =========================================
// TOAST
// =========================================

function showToast(icon, msg, type) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  const iconColors = { success: '#52c41a', error: '#ff4d4f', info: '#1677ff', warn: '#fa8c16' };
  el.innerHTML = `
    <span class="toast-icon">${icon}</span>
    <span>${msg}</span>
  `;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// =========================================
// DRAG & DROP — cross-row reassign simulation
// =========================================

// We override the drag end to show reassignment toast
let _dragOrigParent = null;

gantt.attachEvent('onBeforeTaskDrag', function(id, mode, e) {
  const task = gantt.getTask(id);
  if (task._isGroup || task._isEmployee) return false;
  _dragOrigParent = task.parent;
  return true;
});

gantt.attachEvent('onAfterTaskDrag', function(id, mode, e) {
  const task = gantt.getTask(id);
  if (!task || task._isGroup || task._isEmployee) return;

  // Simulate: if dropped near different row, update parent
  // DHTMLX Standard doesn't auto-change parent on timeline drag,
  // so we show a toast to demonstrate the UX
  const init = task._init;
  const empName = task._emp ? task._emp.name : 'сотрудника';
  if (mode === 'move') {
    showToast('✅', `Назначено на ${empName} · ${init ? init.name : ''}`, 'success');
  }
});

// =========================================
// POPULATE INITIATIVE FILTER
// =========================================

function populateInitFilter() {
  const sel = document.getElementById('initFilter');
  INITIATIVES.forEach(i => {
    const opt = document.createElement('option');
    opt.value = i.id;
    opt.textContent = i.name;
    sel.appendChild(opt);
  });
}

// =========================================
// INIT
// =========================================

document.addEventListener('DOMContentLoaded', function() {
  populateInitFilter();

  const data = buildGanttData();

  gantt.init('gantt_here');
  gantt.parse(data);

  // Open sidebar by default
  sidebarOpen = true;

  // Scale: week by default
  setScale('week');
});
</script>
