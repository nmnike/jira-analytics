networks:
  internal:
    external: true

volumes:
  pgdata-prod:
    name: pgdata-prod
  app-data-prod:
    name: app-data-prod

services:

  postgres:
    image: postgres:16-alpine
    container_name: jira-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jira_analytics_prod
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: Europe/Moscow
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d jira_analytics_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  jira-analytics:
    image: jira-analytics:${APP_VERSION}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api/v1"
    container_name: jira-analytics
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Overrides any DATABASE_URL that might be in .env
      DATABASE_URL: "postgresql://app:${DB_PASSWORD}@postgres:5432/jira_analytics_prod"
      HF_HOME: /opt/hf-cache
    volumes:
      - app-data-prod:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 6G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

